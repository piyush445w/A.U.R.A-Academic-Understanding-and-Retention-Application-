{% extends "base.html" %}

{% block title %}New Intervention - A.U.R.A{% endblock %}

{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('main.dashboard') }}">Home</a></li>
<li class="breadcrumb-item"><a href="{{ url_for('counseling.dashboard') }}">Counseling & Support</a></li>
<li class="breadcrumb-item active">New Intervention</li>
{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-clipboard-check me-2"></i>New Intervention
        </h1>
    </div>
    
    <div class="card shadow mb-4">
        <div class="card-body">
            <form method="POST" action="{{ url_for('counseling.new_intervention') }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Student *</label>
                        <select name="student_id" class="form-select" required>
                            <option value="">Select Student</option>
                            {% for student in students %}
                            <option value="{{ student.id }}" {% if request.args.get('student_id')|int == student.id %}selected{% endif %}>
                                {{ student.full_name }} ({{ student.student_id }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Intervention Type</label>
                        <select name="intervention_type" class="form-select">
                            <option value="Academic Support">Academic Support</option>
                            <option value="Mentoring">Mentoring</option>
                            <option value="Financial Aid">Financial Aid</option>
                            <option value="Counseling">Counseling</option>
                            <option value="Behavioral Plan">Behavioral Plan</option>
                            <option value="Referral">Referral</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Priority</label>
                        <select name="priority" class="form-select">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                            <option value="Urgent">Urgent</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Title *</label>
                    <input type="text" name="title" class="form-control" required placeholder="Intervention title...">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Describe the intervention..."></textarea>
                </div>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Start Date *</label>
                        <input type="date" name="start_date" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Target Date</label>
                        <input type="date" name="target_date" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="Planned" selected>Planned</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Support Plan (optional)</label>
                        <select name="support_plan_id" class="form-select">
                            <option value="">Select Support Plan</option>
                            {% for plan in plans %}
                            <option value="{{ plan.id }}">{{ plan.title }} - {{ plan.student.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Related Session (optional)</label>
                        <select name="counseling_session_id" class="form-select">
                            <option value="">Select Session</option>
                            {% for session in sessions %}
                            <option value="{{ session.id }}">{{ session.session_date.strftime('%Y-%m-%d') }} - {{ session.student.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="text-end">
                    <a href="{{ url_for('counseling.dashboard') }}" class="btn btn-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Intervention</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
