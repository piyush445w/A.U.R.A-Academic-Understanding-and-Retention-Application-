{% extends "base.html" %}

{% block title %}New Counseling Session - A.U.R.A{% endblock %}

{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('main.dashboard') }}">Home</a></li>
<li class="breadcrumb-item"><a href="{{ url_for('counseling.dashboard') }}">Counseling & Support</a></li>
<li class="breadcrumb-item active">New Session</li>
{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-comments me-2"></i>New Counseling Session
        </h1>
    </div>
    
    <div class="card shadow mb-4">
        <div class="card-body">
            <form method="POST" action="{{ url_for('counseling.new_session') }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Student *</label>
                        <select name="student_id" class="form-select" required>
                            <option value="">Select Student</option>
                            {% for student in students %}
                            <option value="{{ student.id }}" {% if request.args.get('student_id')|int == student.id %}selected{% endif %}>
                                {{ student.full_name }} ({{ student.student_id }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Session Date *</label>
                        <input type="datetime-local" name="session_date" class="form-control" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Duration (minutes)</label>
                        <input type="number" name="duration_minutes" class="form-control" min="15" max="180" value="30">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Session Type</label>
                        <select name="session_type" class="form-select">
                            <option value="Routine">Routine</option>
                            <option value="Initial">Initial</option>
                            <option value="Follow-up">Follow-up</option>
                            <option value="Crisis">Crisis</option>
                            <option value="Exit">Exit</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Session Mode</label>
                        <select name="session_mode" class="form-select">
                            <option value="In-Person">In-Person</option>
                            <option value="Virtual">Virtual</option>
                            <option value="Phone">Phone</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Outcome</label>
                        <select name="outcome" class="form-select">
                            <option value="Ongoing" selected>Ongoing</option>
                            <option value="Resolved">Resolved</option>
                            <option value="Escalated">Escalated</option>
                            <option value="No Show">No Show</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Concern Areas</label>
                    <textarea name="concern_areas" class="form-control" rows="2" placeholder="What are the main concerns?"></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Discussion Summary</label>
                    <textarea name="discussion_summary" class="form-control" rows="4" placeholder="Summary of what was discussed..."></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Action Items</label>
                    <textarea name="action_items" class="form-control" rows="2" placeholder="What actions need to be taken?"></textarea>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Resources Provided</label>
                        <textarea name="resources_provided" class="form-control" rows="2" placeholder="Materials or resources given to student..."></textarea>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Referrals</label>
                        <textarea name="referrals" class="form-control" rows="2" placeholder="Any external referrals made..."></textarea>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="follow_up_required" class="form-check-input" id="followUpRequired" checked>
                            <label class="form-check-label" for="followUpRequired">Follow-up Required</label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Follow-up Date</label>
                        <input type="date" name="follow_up_date" class="form-control">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="student_agreed" class="form-check-input" id="studentAgreed">
                            <label class="form-check-label" for="studentAgreed">Student Agreed to Plan</label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="is_confidential" class="form-check-input" id="isConfidential" checked>
                            <label class="form-check-label" for="isConfidential">Keep Session Confidential</label>
                        </div>
                    </div>
                </div>
                
                <div class="text-end">
                    <a href="{{ url_for('counseling.dashboard') }}" class="btn btn-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Session</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
