{% extends "base.html" %}

{% block title %}Add Marks - A.U.R.A{% endblock %}

{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('main.dashboard') }}">Home</a></li>
<li class="breadcrumb-item active">Add Marks</li>
{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-chart-line me-2"></i>Add Marks
        </h1>
    </div>
    
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Student Marks Entry</h6>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('admin.submit_marks') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Student <span class="text-danger">*</span></label>
                                <select class="form-select" name="student_id" required>
                                    <option value="">Select Student</option>
                                    {% for student in students %}
                                    <option value="{{ student.id }}">{{ student.student_id }} - {{ student.full_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Subject <span class="text-danger">*</span></label>
                                <select class="form-select" name="subject_id" required>
                                    <option value="">Select Subject</option>
                                    {% for subject in subjects %}
                                    <option value="{{ subject.id }}">{{ subject.subject_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Exam Type <span class="text-danger">*</span></label>
                                <select class="form-select" name="exam_type" required>
                                    <option value="">Select Type</option>
                                    <option value="Midterm">Midterm</option>
                                    <option value="Final">Final</option>
                                    <option value="Quiz">Quiz</option>
                                    <option value="Assignment">Assignment</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Marks Obtained <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="marks_obtained" required min="0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Max Marks <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="max_marks" required min="1">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Exam Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" name="exam_date" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Remarks</label>
                                <textarea class="form-control" name="remarks" rows="2"></textarea>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">Save Marks</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
